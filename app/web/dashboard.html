<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PLC Dashboard</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --panel: #ffffff;
      --ink: #1f2937;
      --sub: #6b7280;
      --line: #d7dce7;
      --accent: #0f766e;
      --accent-2: #115e59;
      --danger: #b91c1c;
      --ok: #047857;
      --shadow: 0 10px 25px rgba(15, 23, 42, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at 10% 10%, rgba(15, 118, 110, 0.08), transparent 42%),
        radial-gradient(circle at 90% 90%, rgba(17, 94, 89, 0.08), transparent 45%),
        var(--bg);
      min-height: 100vh;
    }

    .wrap {
      max-width: 1200px;
      margin: 24px auto;
      padding: 0 14px 24px;
    }

    .hero {
      background: linear-gradient(125deg, #0f766e, #0b3f3a);
      color: #fff;
      border-radius: 18px;
      padding: 20px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .hero h1 {
      margin: 0;
      font-size: 24px;
      letter-spacing: 0.2px;
    }

    .hero p {
      margin: 8px 0 0;
      opacity: 0.92;
    }

    .grid {
      display: grid;
      gap: 14px;
      grid-template-columns: 1.25fr 1fr;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 14px;
      box-shadow: var(--shadow);
    }

    .title {
      font-size: 17px;
      font-weight: 700;
      margin: 0 0 10px;
    }

    .sub {
      color: var(--sub);
      margin: 0 0 12px;
      font-size: 13px;
    }

    .btn-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 10px;
    }

    button {
      border: 0;
      border-radius: 10px;
      padding: 9px 12px;
      font-size: 13px;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
    }

    button.alt {
      background: #334155;
    }

    button:hover {
      opacity: 0.95;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      text-align: left;
      padding: 8px 6px;
      vertical-align: top;
    }

    th {
      color: #334155;
      font-weight: 700;
      white-space: nowrap;
    }

    .ok {
      color: var(--ok);
      font-weight: 700;
    }

    .bad {
      color: var(--danger);
      font-weight: 700;
    }

    .mono {
      font-family: Consolas, Menlo, monospace;
      font-size: 12px;
      word-break: break-all;
    }

    .plc-icon {
      width: 56px;
      height: 32px;
      object-fit: contain;
      display: block;
      margin: 0 auto;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(15, 23, 42, 0.16);
      border: 1px solid rgba(15, 23, 42, 0.08);
      background: #fff;
    }

    .plc-icon-cell {
      width: 70px;
      text-align: center;
    }

    .form-grid {
      display: grid;
      gap: 8px;
      grid-template-columns: 1fr;
    }

    label {
      font-size: 13px;
      color: #334155;
      font-weight: 600;
    }

    input, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 14px;
      background: #fff;
      color: #111827;
    }

    .result {
      margin-top: 10px;
      border: 1px dashed #a8b1c6;
      border-radius: 10px;
      background: #f8fafc;
      padding: 10px;
      min-height: 70px;
      white-space: pre-wrap;
      font-size: 13px;
    }

    .tags {
      margin-top: 12px;
      max-height: 280px;
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: 10px;
    }

    .tags table {
      font-size: 12px;
    }

    #plcTable tbody tr,
    #valueTable tbody tr {
      cursor: pointer;
    }

    #plcTable tbody tr:hover,
    #valueTable tbody tr:hover {
      background: #ecfdf5;
    }

    #plcTable tbody tr.selected,
    #valueTable tbody tr.selected {
      background: #d1fae5;
    }

    @media (max-width: 980px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .hero h1 {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>PLC 통합 모니터링 대시보드</h1>
      <p>PLC 상태/태그값 조회와 특정 태그 읽기·쓰기를 한 화면에서 처리합니다.</p>
    </section>

    <section class="grid">
      <article class="panel">
        <h2 class="title">PLC 목록 및 연결 상태</h2>
        <p class="sub">활성 PLC 정보와 연결 상태를 실시간 갱신합니다.</p>
        <div class="btn-row">
          <button id="btnRefreshInfo">정보 새로고침</button>
          <button class="alt" id="btnRefreshValues">전체 태그 읽기</button>
        </div>
        <div style="overflow:auto;">
          <table id="plcTable">
            <thead>
              <tr>
                <th>PLC</th>
                <th>이미지</th>
                <th>타입</th>
                <th>IP</th>
                <th>PORT</th>
                <th>연결</th>
                <th>태그 수</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>

        <div class="tags">
          <table id="valueTable">
            <thead>
              <tr>
                <th>PLC</th>
                <th>태그</th>
                <th>값</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </article>

      <article class="panel">
        <h2 class="title">특정 태그 읽기 / 쓰기</h2>
        <p class="sub">PLC와 태그를 선택한 뒤 읽기/쓰기를 실행하세요.</p>

        <div class="form-grid">
          <div>
            <label for="plcSelect">PLC 선택</label>
            <select id="plcSelect"></select>
          </div>

          <div>
            <label for="tagSelect">태그</label>
            <select id="tagSelect"></select>
          </div>

          <div>
            <label for="valueInput">쓰기 값</label>
            <input id="valueInput" placeholder="예: 123 또는 ON" />
          </div>

          <div class="btn-row">
            <button id="btnRead">태그 읽기</button>
            <button id="btnWrite">태그 쓰기</button>
          </div>
        </div>

        <div class="result" id="resultBox">결과가 여기에 표시됩니다.</div>
      </article>
    </section>
  </div>

  <script>
    const plcTableBody = document.querySelector('#plcTable tbody');
    const valueTableBody = document.querySelector('#valueTable tbody');
    const plcSelect = document.getElementById('plcSelect');
    const tagSelect = document.getElementById('tagSelect');
    const valueInput = document.getElementById('valueInput');
    const resultBox = document.getElementById('resultBox');

    let plcListCache = [];
    let selectedPlcName = '';

    function renderResult(data) {
      resultBox.textContent = JSON.stringify(data, null, 2);
    }

    function findSelectedPlc() {
      const plcName = plcSelect.value;
      return plcListCache.find(item => item.name === plcName) || null;
    }

    function syncPlcSelection(plcName) {
      selectedPlcName = plcName || '';
      if (selectedPlcName) {
        plcSelect.value = selectedPlcName;
      }

      const rows = plcTableBody.querySelectorAll('tr');
      rows.forEach(row => {
        row.classList.toggle('selected', row.dataset.plcName === selectedPlcName);
      });
    }

    function fillTagFromSelectedPlc(preferredTag = '') {
      const plc = findSelectedPlc();
      tagSelect.innerHTML = '';

      if (!plc || !Array.isArray(plc.tags) || plc.tags.length === 0) {
        const option = document.createElement('option');
        option.value = '';
        option.textContent = '태그 없음';
        tagSelect.appendChild(option);
        return;
      }

      for (const tag of plc.tags) {
        const option = document.createElement('option');
        option.value = tag;
        option.textContent = tag;
        tagSelect.appendChild(option);
      }

      if (preferredTag && plc.tags.includes(preferredTag)) {
        tagSelect.value = preferredTag;
      } else {
        tagSelect.value = plc.tags[0];
      }
    }

    function getPlcFallbackImage(driverType) {
      const type = String(driverType || '').toUpperCase();
      const imageMap = {
        OPCUA: { label: 'UA', bg: '#0f766e' },
        OPCDA: { label: 'DA', bg: '#2563eb' },
        MITSUBISHI: { label: 'M', bg: '#15803d' },
        SIEMENS: { label: 'S7', bg: '#0ea5e9' },
        ROCKWELL: { label: 'AB', bg: '#ea580c' }
      };

      const cfg = imageMap[type] || { label: 'PLC', bg: '#334155' };

      const svg = `
        <svg xmlns='http://www.w3.org/2000/svg' width='96' height='54' viewBox='0 0 96 54'>
          <rect x='1' y='1' width='94' height='52' rx='10' fill='${cfg.bg}' stroke='rgba(255,255,255,0.35)' />
          <rect x='8' y='8' width='80' height='38' rx='6' fill='rgba(255,255,255,0.12)' />
          <circle cx='80' cy='18' r='4' fill='#22c55e' />
          <text x='48' y='34' text-anchor='middle' fill='#ffffff' font-size='18' font-weight='700' font-family='Segoe UI, Arial, sans-serif'>${cfg.label}</text>
        </svg>
      `;

      return `data:image/svg+xml;utf8,${encodeURIComponent(svg)}`;
    }

    function getPlcLogoPath(driverType) {
      const type = String(driverType || '').toUpperCase();
      const logoMap = {
        OPCUA: '/static/assets/plc_logos/opcua.jpg',
        OPCDA: '/static/assets/plc_logos/opcda.jpg',
        MITSUBISHI: '/static/assets/plc_logos/mitsubishi.png',
        SIEMENS: '/static/assets/plc_logos/siemens.png',
        ROCKWELL: '/static/assets/plc_logos/rockwell.png'
      };

      return logoMap[type] || '/static/assets/plc_logos/default.jpg';
    }

    async function loadPlcInfo() {
      const res = await fetch('/plc_list');
      const data = await res.json();
      const list = data && data.Payload ? data.Payload : [];
      plcListCache = Array.isArray(list) ? list : [];

      plcTableBody.innerHTML = '';
      plcSelect.innerHTML = '';

      for (const plc of plcListCache) {
        const tr = document.createElement('tr');
        const logoPath = getPlcLogoPath(plc.driver_type);
        const fallbackImage = getPlcFallbackImage(plc.driver_type);
        tr.dataset.plcName = plc.name || '';
        tr.innerHTML = `
          <td>${plc.name || ''}</td>
          <td class="plc-icon-cell"><img class="plc-icon" src="${logoPath}" data-fallback="${fallbackImage}" alt="${plc.driver_type || 'PLC'}" /></td>
          <td>${plc.driver_type || ''}</td>
          <td>${plc.ip || ''}</td>
          <td>${plc.port ?? ''}</td>
          <td class="${plc.connected ? 'ok' : 'bad'}">${plc.connected ? 'Connected' : 'Disconnected'}</td>
          <td>${Array.isArray(plc.tags) ? plc.tags.length : 0}</td>
        `;

        const logoImg = tr.querySelector('img.plc-icon');
        if (logoImg) {
          logoImg.addEventListener('error', () => {
            const fallback = logoImg.dataset.fallback;

            if (fallback && logoImg.src !== fallback) {
              logoImg.src = fallback;
            }
          });
        }

        plcTableBody.appendChild(tr);

        const option = document.createElement('option');
        option.value = plc.name;
        option.textContent = plc.name;
        plcSelect.appendChild(option);
      }

      if (!selectedPlcName && plcListCache.length > 0) {
        selectedPlcName = plcListCache[0].name;
      }
      syncPlcSelection(selectedPlcName);

      fillTagFromSelectedPlc();
      renderResult(data);
    }

    async function loadTagValues(plcName) {
      const tagsByPlc = {};

      if (plcName) {
        const plc = plcListCache.find(item => item.name === plcName);
        if (plc) {
          tagsByPlc[plc.name] = Array.isArray(plc.tags) ? plc.tags : [];
        }
      } else {
        for (const plc of plcListCache) {
          tagsByPlc[plc.name] = Array.isArray(plc.tags) ? plc.tags : [];
        }
      }

      const res = await fetch('/plc_read_all', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tags_by_plc: tagsByPlc })
      });
      const data = await res.json();
      const payload = data && data.Payload ? data.Payload : {};

      valueTableBody.innerHTML = '';
      for (const plcName of Object.keys(payload)) {
        const item = payload[plcName] || {};
        const rows = item.data || {};
        if (!item.ok) {
          const tr = document.createElement('tr');
          tr.innerHTML = `<td>${plcName}</td><td colspan="2" class="bad">${item.error || 'read error'}</td>`;
          valueTableBody.appendChild(tr);
          continue;
        }

        for (const tag of Object.keys(rows)) {
          const tr = document.createElement('tr');
          const val = rows[tag];
          tr.dataset.plcName = plcName;
          tr.dataset.tag = tag;
          tr.dataset.value = val == null ? '' : String(val);
          tr.innerHTML = `
            <td>${plcName}</td>
            <td class="mono">${tag}</td>
            <td class="mono">${String(val)}</td>
          `;
          valueTableBody.appendChild(tr);
        }
      }

      renderResult(data);
    }

    async function loadAllTagValues() {
      await loadTagValues('');
    }

    async function loadSelectedPlcTags() {
      if (!selectedPlcName) {
        return;
      }
      await loadTagValues(selectedPlcName);
    }

    async function updatePlcConnectionStatus() {
      try {
        const res = await fetch('/plc_list');
        const data = await res.json();
        const list = data && data.Payload ? data.Payload : [];
        if (!Array.isArray(list)) return;

        // Update cache
        for (const newPlc of list) {
          const cached = plcListCache.find(p => p.name === newPlc.name);
          if (cached) {
            cached.connected = newPlc.connected;
          }
        }

        // Update table display
        for (const newPlc of list) {
          const row = plcTableBody.querySelector(`tr[data-plc-name="${newPlc.name}"]`);
          if (!row) continue;
          const statusCell = row.cells[5];
          if (statusCell) {
            statusCell.className = newPlc.connected ? 'ok' : 'bad';
            statusCell.textContent = newPlc.connected ? 'Connected' : 'Disconnected';
          }
        }
      } catch (err) {
        // Silently ignore to prevent log spam
      }
    }

    async function readTag() {
      const plc_name = plcSelect.value;
      const tag = (tagSelect.value || '').trim();

      if (!plc_name || !tag) {
        renderResult({ error: 'PLC와 태그를 입력하세요.' });
        return;
      }

      const res = await fetch('/api/plc/read-tag', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ plc_name, tag })
      });
      const data = await res.json();
      renderResult(data);
    }

    async function writeTag() {
      const plc_name = plcSelect.value;
      const tag = (tagSelect.value || '').trim();
      const value = valueInput.value;

      if (!plc_name || !tag) {
        renderResult({ error: 'PLC와 태그를 입력하세요.' });
        return;
      }

      const res = await fetch('/api/plc/write-tag', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ plc_name, tag, value })
      });
      const data = await res.json();
      renderResult(data);
    }

    document.getElementById('btnRefreshInfo').addEventListener('click', loadPlcInfo);
    document.getElementById('btnRefreshValues').addEventListener('click', loadAllTagValues);
    document.getElementById('btnRead').addEventListener('click', readTag);
    document.getElementById('btnWrite').addEventListener('click', writeTag);

    plcSelect.addEventListener('change', async () => {
      syncPlcSelection(plcSelect.value);
      fillTagFromSelectedPlc();
      await loadSelectedPlcTags();
    });

    plcTableBody.addEventListener('click', async (event) => {
      const row = event.target.closest('tr');
      if (!row) {
        return;
      }

      const plcName = row.dataset.plcName;
      if (!plcName) {
        return;
      }

      syncPlcSelection(plcName);
      fillTagFromSelectedPlc();
      await loadSelectedPlcTags();
    });

    valueTableBody.addEventListener('click', (event) => {
      const row = event.target.closest('tr');
      if (!row) {
        return;
      }

      const plcName = row.dataset.plcName;
      const tag = row.dataset.tag;
      if (!plcName || !tag) {
        return;
      }

      const rows = valueTableBody.querySelectorAll('tr');
      rows.forEach(item => item.classList.remove('selected'));
      row.classList.add('selected');

      syncPlcSelection(plcName);
      fillTagFromSelectedPlc(tag);
      valueInput.value = row.dataset.value || '';
    });

    (async function init() {
      try {
        await loadPlcInfo();
        await loadSelectedPlcTags();
        // Auto-update PLC connection status every 1 second
        setInterval(updatePlcConnectionStatus, 1000);
      } catch (err) {
        renderResult({ error: String(err) });
      }
    })();
  </script>
</body>
</html>
